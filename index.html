<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="canvas">
        <div id="photo-booth-window" class="window">
            <div class="title-bar" id="title-bar">
                <div class="window-controls">
                    <button class="control red"></button>
                    <button class="control yellow"></button>
                    <button class="control green"></button>
                </div>
                <div class="title">Photo Booth</div>
                <div class="spacer"></div>
            </div>
            <div class="camera-view">
                <div class="no-camera-message" id="no-camera-message">
                    <i class="fa-solid fa-video-slash"></i>
                    <p>There is no connected camera.</p>
                </div>
                <video id="video-feed" autoplay playsinline style="display: none;"></video>
                <img id="preview-image" style="display: none;">
                <video id="preview-video" autoplay loop playsinline style="display: none;"></video>
                <div id="flash-overlay"></div>
                <!-- Effects Grid Panel -->
                <div id="effects-grid" class="effects-grid" style="display: none;">
                    <div class="effect-cell" data-effect="none" data-filter="none">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Normal</span>
                    </div>
                    <div class="effect-cell" data-effect="comic" data-filter="saturate(2) contrast(1.5) brightness(1.1)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Comic Book</span>
                    </div>
                    <div class="effect-cell" data-effect="sepia" data-filter="sepia(1) contrast(1.1)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Sepia</span>
                    </div>
                    <div class="effect-cell" data-effect="bw" data-filter="grayscale(1) contrast(1.1)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Black &amp; White</span>
                    </div>
                    <div class="effect-cell" data-effect="xray" data-filter="invert(1) grayscale(1) contrast(1.3)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">X-Ray</span>
                    </div>
                    <div class="effect-cell" data-effect="thermal" data-filter="grayscale(1) invert(1) sepia(1) hue-rotate(90deg) saturate(4)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Thermal</span>
                    </div>
                    <div class="effect-cell" data-effect="vintage" data-filter="sepia(0.5) hue-rotate(-10deg) saturate(1.4) contrast(0.85) brightness(0.95)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Vintage</span>
                    </div>
                    <div class="effect-cell" data-effect="cool" data-filter="hue-rotate(180deg) saturate(1.4) brightness(1.05)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Cool</span>
                    </div>
                    <div class="effect-cell" data-effect="glow" data-filter="brightness(1.2) contrast(0.8) saturate(1.5) blur(0.5px)">
                        <video class="effect-preview" autoplay playsinline muted></video>
                        <span class="effect-label">Glow</span>
                    </div>
                </div>
                <!-- Gallery Strip -->
                <div id="gallery-strip" class="gallery-strip"></div>
            </div>
            <canvas id="capture-canvas" style="display: none;"></canvas>
            <div class="bottom-bar">
                <div id="video-timer" class="video-timer" style="display: none;">00:00:00</div>
                <div class="view-modes" id="view-modes">
                    <button class="mode-btn" id="mode-4grid" data-mode="4grid"><i class="fa-solid fa-border-all"></i></button>
                    <button class="mode-btn active" id="mode-single" data-mode="single"><i class="fa-regular fa-square"></i></button>
                    <button class="mode-btn" id="mode-video" data-mode="video"><i class="fa-solid fa-film"></i></button>
                </div>
                <div class="capture-section">
                    <button class="capture-btn" id="capture-btn"><i class="fa-solid fa-camera"></i></button>
                </div>
                <div class="effects-section">
                    <button class="effects-btn" id="effects-btn">Effects</button>
                </div>
                <!-- Countdown Overlay -->
                <div id="countdown-overlay" class="countdown-overlay">
                    <span class="count-num" id="count-3">3</span>
                    <span class="count-num" id="count-2">2</span>
                    <span class="count-num" id="count-1">1</span>
                    <span class="count-icon" id="count-icon"><i class="fa-solid fa-camera"></i></span>
                </div>
            </div>
            <div class="resize-handle"></div>
            
            <!-- Additional edges for resizing -->
            <div class="resize-edge resize-top" data-edge="top"></div>
            <div class="resize-edge resize-right" data-edge="right"></div>
            <div class="resize-edge resize-bottom" data-edge="bottom"></div>
            <div class="resize-edge resize-left" data-edge="left"></div>
        </div>
    </div>
    
    <!-- Global Settings Button -->
    <button id="global-settings-btn" class="global-settings-btn">
        <i class="fa-solid fa-gear"></i>
    </button>

    <!-- Settings Modal -->
    <div id="settings-modal" class="settings-modal" style="display: none;">
        <div class="settings-content">
            <div class="settings-header">
                <h2>Preferences</h2>
                <button id="close-settings-btn" class="close-settings-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="settings-body">
                <div class="setting-row">
                    <label for="toggle-gallery">Show Gallery Carousel</label>
                    <label class="switch">
                        <input type="checkbox" id="toggle-gallery" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                
                <div class="setting-row">
                    <label for="toggle-autodownload">Auto-Download Media</label>
                    <label class="switch">
                        <input type="checkbox" id="toggle-autodownload">
                        <span class="slider round"></span>
                    </label>
                </div>
                
                <div class="setting-row">
                    <label for="toggle-countdown">Enable 3-Second Countdown</label>
                    <label class="switch">
                        <input type="checkbox" id="toggle-countdown" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="setting-section">
                    <h3>Aspect Ratio</h3>
                    <div class="aspect-selector" id="aspect-selector">
                        <button class="aspect-btn" data-aspect="1/1">1:1</button>
                        <button class="aspect-btn" data-aspect="4/3">4:3</button>
                        <button class="aspect-btn active" data-aspect="3/2">3:2</button>
                        <button class="aspect-btn" data-aspect="16/9">16:9</button>
                    </div>
                </div>

                <div class="setting-section">
                    <h3>Background Theme</h3>
                    <div class="bg-selector" id="bg-selector">
                        <button class="bg-btn active" data-bg="bg-classic">Classic Grid</button>
                        <button class="bg-btn" data-bg="bg-gray">Solid Gray</button>
                        <button class="bg-btn" data-bg="bg-black">Solid Black</button>
                        <button class="bg-btn" data-bg="bg-white">Solid White</button>
                        <button class="bg-btn" data-bg="bg-monterey">Monterey</button>
                        <button class="bg-btn" data-bg="bg-bigsur">Big Sur</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
